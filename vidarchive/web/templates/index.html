{% extends "base.html" %}

{% block title %}vidarchive — Download{% endblock %}

{% block content %}
<form action="{{ url_for('main.download') }}" method="post" class="download-form">
    <label for="url">YouTube URL</label>
    <input type="url" id="url" name="url" placeholder="https://www.youtube.com/watch?v=..." required>

    <label for="mode">Download type</label>
    <select id="mode" name="mode">
        <option value="video">Single video</option>
        <option value="playlist">Playlist</option>
        <option value="channel">Entire channel</option>
    </select>

    <label for="browser">Use cookies from browser</label>
    <select id="browser" name="browser">
        <option value="">None (anonymous)</option>
        <option value="chrome">Chrome</option>
        <option value="firefox">Firefox</option>
        <option value="edge">Edge</option>
        <option value="safari">Safari</option>
        <option value="brave">Brave</option>
        <option value="opera">Opera</option>
        <option value="chromium">Chromium</option>
    </select>

    <button type="submit">Download</button>

    <p class="hint">Downloads may take a while. The page will update when finished.</p>
</form>
{% endblock %}
