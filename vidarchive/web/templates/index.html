{% extends "base.html" %}

{% block title %}vidarchive — Download{% endblock %}

{% block content %}
<form action="{{ url_for('main.download') }}" method="post" class="download-form">
    <label for="url">YouTube URL</label>
    <input type="url" id="url" name="url" placeholder="https://www.youtube.com/watch?v=..." required>

    <div class="checkbox-row">
        <input type="checkbox" id="playlist" name="playlist">
        <label for="playlist">This is a playlist</label>
    </div>

    <button type="submit">Download</button>

    <p class="hint">Downloads may take a while. The page will update when finished.</p>
</form>
{% endblock %}
