<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}vidarchive{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="{{ url_for('main.index') }}">vidarchive</a></h1>
            <p class="subtitle">Personal YouTube Video Archiver</p>
        </header>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flashes">
            {% for msg in messages %}
            <p class="flash">{{ msg }}</p>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
